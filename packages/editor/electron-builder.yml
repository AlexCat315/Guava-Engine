appId: com.guava.editor
productName: GuavaEditor
copyright: Copyright © 2024 Guava Engine

directories:
  output: dist-package

# ASAR packaging with integrity verification (Electron 30+)
# Prevents casual extraction with `asar extract` and detects tampering
asar: true
asarUnpack:
  # Native .node addons cannot be executed from inside ASAR
  - "**/*.node"

# Files that go into the asar (renderer + main process JS)
files:
  - dist/**
  - package.json

# Extra binaries/resources copied alongside the asar, not bundled inside it
# (needed so the OS can execute guava-engine and load the native .node addon)
extraResources:
  - from: ../engine/zig-out/bin/guava-engine
    to: guava-engine
  - from: native/build/Release/iosurface_view.node
    to: iosurface_view.node
    filter:
      - "**"

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
  # Disable hardened runtime so the engine subprocess can run without notarization
  hardenedRuntime: false
  icon: assets/icons/Guava_Engine_Logo.png

dmg:
  title: GuavaEditor

linux:
  target: AppImage
  extraResources:
    - from: ../engine/zig-out/bin/guava-engine
      to: guava-engine

win:
  target: nsis
  extraResources:
    - from: ../engine/zig-out/bin/guava-engine.exe
      to: guava-engine.exe
