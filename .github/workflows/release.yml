name: Release

on:
  release:
    types: [created]

jobs:
  # ── Create the GitHub Release first ──────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

  # ── macOS: arm64 + x86_64 + universal ────────────────────────────────────
  build-macos:
    name: macOS
    needs: create-release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Build arm64
        working-directory: guava-mcp
        run: swift build -c release --arch arm64

      - name: Build x86_64
        working-directory: guava-mcp
        run: swift build -c release --arch x86_64

      - name: Package
        working-directory: guava-mcp
        run: |
          ARM=.build/arm64-apple-macosx/release/GuavaMCP
          X86=.build/x86_64-apple-macosx/release/GuavaMCP

          cp "$ARM" guava-mcp-macos-arm64
          zip guava-mcp-macos-arm64.zip guava-mcp-macos-arm64

          cp "$X86" guava-mcp-macos-x86_64
          zip guava-mcp-macos-x86_64.zip guava-mcp-macos-x86_64

          lipo -create "$ARM" "$X86" -output guava-mcp-macos-universal
          zip guava-mcp-macos-universal.zip guava-mcp-macos-universal

      - name: Upload
        working-directory: guava-mcp
        run: |
          gh release upload ${{ github.ref_name }} \
            guava-mcp-macos-arm64.zip \
            guava-mcp-macos-x86_64.zip \
            guava-mcp-macos-universal.zip
        env:
          GH_TOKEN: ${{ github.token }}

  # ── Linux x86_64 ─────────────────────────────────────────────────────────
  build-linux-x86:
    name: Linux (x86_64)
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Build
        working-directory: guava-mcp
        run: swift build -c release

      - name: Package
        working-directory: guava-mcp
        run: |
          cp .build/release/GuavaMCP guava-mcp-linux-x86_64
          tar czf guava-mcp-linux-x86_64.tar.gz guava-mcp-linux-x86_64

      - name: Upload
        working-directory: guava-mcp
        run: gh release upload ${{ github.ref_name }} guava-mcp-linux-x86_64.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

  # ── Linux arm64 ──────────────────────────────────────────────────────────
  build-linux-arm64:
    name: Linux (arm64)
    needs: create-release
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Build
        working-directory: guava-mcp
        run: swift build -c release

      - name: Package
        working-directory: guava-mcp
        run: |
          cp .build/release/GuavaMCP guava-mcp-linux-arm64
          tar czf guava-mcp-linux-arm64.tar.gz guava-mcp-linux-arm64

      - name: Upload
        working-directory: guava-mcp
        run: gh release upload ${{ github.ref_name }} guava-mcp-linux-arm64.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

  # ── Windows x86_64 ───────────────────────────────────────────────────────
  build-windows:
    name: Windows (x86_64)
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift
        uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-6.0-release
          tag: 6.0-RELEASE

      - name: Build
        working-directory: guava-mcp
        run: swift build -c release

      - name: Package
        working-directory: guava-mcp
        shell: pwsh
        run: |
          Copy-Item .build\release\GuavaMCP.exe guava-mcp-windows-x86_64.exe
          Compress-Archive -Path guava-mcp-windows-x86_64.exe -DestinationPath guava-mcp-windows-x86_64.zip

      - name: Upload
        working-directory: guava-mcp
        shell: pwsh
        run: gh release upload ${{ github.ref_name }} guava-mcp-windows-x86_64.zip
        env:
          GH_TOKEN: ${{ github.token }}
