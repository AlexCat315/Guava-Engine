name: GuavaEditor CI

on:
  push:
    branches: [main, guava-next]
    paths:
      - 'Editor/**'
      - 'Engine/**'
      - 'GuavaUI/**'
      - '.github/workflows/ci-editor.yml'
  pull_request:
    paths:
      - 'Editor/**'
      - 'Engine/**'
      - 'GuavaUI/**'

jobs:
  build:
    name: Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build native deps via CMake (SDL3 + Imath + OpenEXR)
        run: |
          cmake -S third-party -B build/native -DCMAKE_BUILD_TYPE=Release
          cmake --build build/native --parallel --target SDL3-static
          cmake --install build/native
          cmake --build build/native --parallel --target stage_ocio_openexr

      - name: Resolve packages
        working-directory: Editor
        run: swift package resolve

      - name: Build EditorCore
        working-directory: Editor
        run: swift build --target EditorCore

      - name: Run tests
        working-directory: Editor
        run: swift test --filter EditorCoreTests
