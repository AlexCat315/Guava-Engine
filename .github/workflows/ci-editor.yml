name: GuavaEditor CI

on:
  push:
    branches: [main, guava-next]
    paths:
      - 'Editor/**'
      - 'Engine/**'
      - 'GuavaUI/**'
      - '.github/workflows/ci-editor.yml'
  pull_request:
    paths:
      - 'Editor/**'
      - 'Engine/**'
      - 'GuavaUI/**'

jobs:
  build:
    name: Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26.3
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app
          xcodebuild -version
          swift --version

      - name: Build Engine native deps via CMake (SDL3 + Imath + OpenEXR + wgpu)
        run: |
          cmake -S Engine/third-party -B Engine/build/native -DCMAKE_BUILD_TYPE=Release
          cmake --build Engine/build/native --parallel --target SDL3-static
          cmake --build Engine/build/native --parallel --target stage_jolt
          cmake --install Engine/build/native
          cmake --build Engine/build/native --parallel --target stage_ocio_openexr
          cmake --build Engine/build/native --parallel --target stage_image_decode

      - name: Build GuavaUI native deps via CMake (Yoga + FreeType + HarfBuzz)
        run: |
          cmake -S GuavaUI/third-party -B GuavaUI/build/native -DCMAKE_BUILD_TYPE=Release
          cmake --build GuavaUI/build/native --parallel
          cmake --install GuavaUI/build/native

      - name: Resolve packages
        working-directory: Editor
        run: swift package resolve

      - name: Build EditorCore
        working-directory: Editor
        run: swift build --target EditorCore

      - name: Run tests
        working-directory: Editor
        run: |
          swift test --filter EditorCoreTests
          swift test --filter EditorAppTests
