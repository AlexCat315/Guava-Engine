name: GuavaUI CI

on:
  push:
    branches: [main, guava-next]
    paths:
      - 'GuavaUI/**'
      - 'Engine/**'
      - '.github/workflows/ci-guavaui.yml'
  pull_request:
    paths:
      - 'GuavaUI/**'
      - 'Engine/**'

jobs:
  build:
    name: Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build native deps via CMake (SDL3 + Imath + OpenEXR for Engine product)
        run: |
          cmake -S third-party -B build/native -DCMAKE_BUILD_TYPE=Release
          cmake --build build/native --parallel --target SDL3-static
          cmake --install build/native
          cmake --build build/native --parallel --target stage_ocio_openexr

      - name: Resolve packages
        working-directory: GuavaUI
        run: swift package resolve

      - name: Build pure-Swift targets
        working-directory: GuavaUI
        run: |
          swift build --target GuavaUIRuntime
          swift build --target GuavaUICompose
          swift build --target GuavaUIWorkspace
          swift build --target GuavaUIDevTools

      - name: Run tests
        working-directory: GuavaUI
        run: |
          swift test --filter GuavaUIRuntimeTests
          swift test --filter GuavaUIComposeTests
          swift test --filter GuavaUIWorkspaceTests
          swift test --filter GuavaUIDevToolsTests
