name: GuavaUI CI

on:
  push:
    branches: [main, guava-next, next]
    paths:
      - 'GuavaUI/**'
      - 'Engine/**'
      - '.github/workflows/ci-guavaui.yml'
  pull_request:
    paths:
      - 'GuavaUI/**'
      - 'Engine/**'

jobs:
  build:
    name: Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26.3
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app
          xcodebuild -version
          swift --version

      - name: Build Engine native deps via CMake (SDL3 + Imath + OpenEXR + wgpu)
        run: |
          cmake -S Engine/third-party -B Engine/build/native -DCMAKE_BUILD_TYPE=Release
          cmake --build Engine/build/native --parallel --config Release
          cmake --build Engine/build/native --parallel --config Release --target stage_sdl3
          cmake --build Engine/build/native --parallel --config Release --target stage_image_decode
          cmake --install Engine/build/native --config Release --prefix "$RUNNER_TEMP/guava-native-install"

      - name: Build GuavaUI native deps via CMake (Yoga + FreeType + HarfBuzz)
        run: |
          cmake -S GuavaUI/third-party -B GuavaUI/build/native -DCMAKE_BUILD_TYPE=Release
          cmake --build GuavaUI/build/native --parallel
          cmake --install GuavaUI/build/native --prefix "$RUNNER_TEMP/guava-native-install"

      - name: Resolve packages
        working-directory: GuavaUI
        run: swift package resolve

      - name: Build pure-Swift targets
        working-directory: GuavaUI
        run: |
          swift build --target GuavaUIRuntime
          swift build --target GuavaUICompose
          swift build --target GuavaUIWorkspace
          swift build --target GuavaUIDevTools

      - name: Run tests
        working-directory: GuavaUI
        run: |
          swift test --filter GuavaUIRuntimeTests
          swift test --filter GuavaUIComposeTests
          swift test --filter GuavaUIWorkspaceTests
          swift test --filter GuavaUIDevToolsTests
