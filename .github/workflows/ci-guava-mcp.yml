name: guava-mcp CI

on:
  push:
    branches: [main, guava-next]
    paths:
      - 'guava-mcp/**'
      - '.github/workflows/ci-guava-mcp.yml'
  pull_request:
    paths:
      - 'guava-mcp/**'

jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build (release)
        working-directory: guava-mcp
        run: swift build -c release
